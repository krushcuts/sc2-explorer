<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SC2 Explorer">
<link rel="apple-touch-icon" href="icon-192.png?v=2">
<link rel="icon" href="icon-192.png?v=2">
<link rel="manifest" href="manifest.json">
<title>SC2 Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Dark theme (default) ── */
:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --bdr:rgba(255,255,255,.11);--bdr2:rgba(255,255,255,.24);
  --accent:#EF9F27;--teal:#5DCAA5;
  --info-bg:#0c2a47;--info-tx:#85b7eb;
  --ok-bg:#173404;--ok-tx:#97c459;
  --warn-bg:#412402;--warn-tx:#fac775;
  --bad-bg:#2d1010;--bad-tx:#f09595;--bad-bdr:rgba(240,149,149,.35);
  --r:10px;--rs:6px;
}
/* ── Light theme ── */
html.light{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#e8e8e4;
  --text:#1a1a1a;--text2:#666660;--text3:#999993;
  --bdr:rgba(0,0,0,.11);--bdr2:rgba(0,0,0,.22);
  --info-bg:#e6f1fb;--info-tx:#0c447c;
  --ok-bg:#eaf3de;--ok-tx:#27500a;
  --warn-bg:#faeeda;--warn-tx:#633806;
  --bad-bg:#fcebeb;--bad-tx:#a32d2d;--bad-bdr:rgba(163,45,45,.35);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent}
body{padding-bottom:env(safe-area-inset-bottom)}
#app{max-width:700px;margin:0 auto;padding:16px 16px 100px}

input,select,textarea{font-size:16px;padding:10px 12px;width:100%;background:var(--bg);color:var(--text);border:.5px solid var(--bdr2);border-radius:var(--rs);outline:none;font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color .15s}
input[type=checkbox]{width:18px;height:18px;min-width:18px;padding:0;appearance:auto;-webkit-appearance:checkbox;cursor:pointer;accent-color:var(--teal);border:none;background:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;line-height:1.5}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

button{font-size:14px;padding:10px 16px;cursor:pointer;background:var(--bg);color:var(--text);border:.5px solid var(--bdr2);border-radius:var(--rs);font-family:inherit;transition:background .1s,transform .08s;white-space:nowrap}
button:active{background:var(--bg3);transform:scale(.97)}

.btn-primary{font-weight:600}
.btn-danger{color:var(--bad-tx);border-color:var(--bad-bdr)}
.btn-sm{font-size:13px;padding:7px 13px}
.btn-full{width:100%;margin-bottom:8px}
.btn-del{font-size:14px;padding:4px 9px;color:var(--bad-tx);border:none;background:transparent;border-radius:var(--rs);flex-shrink:0;min-width:32px;line-height:1}
.btn-del:active{background:var(--bad-bg)}
.btn-theme{font-size:13px;padding:5px 12px;border-radius:20px;border:.5px solid var(--bdr2);background:var(--bg2);color:var(--text2);cursor:pointer;flex-shrink:0}

.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:8px}
.header-left .title{font-size:20px;font-weight:700;font-family:'SF Mono','Fira Mono',monospace;letter-spacing:-.5px}
.header-left .sub{font-size:11px;color:var(--text3);font-family:monospace}
.header-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.header-row1-left{display:flex;align-items:center;gap:10px}
.app-icon{width:36px;height:36px;border-radius:6px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.header-row2{display:flex;gap:12px;padding-bottom:4px}
.upgrades-row{display:flex;align-items:center;gap:14px;padding:8px 0 6px;border-top:.5px solid var(--bdr);flex-wrap:wrap}
.upgrades-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;flex-shrink:0}
.upgrade-chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;user-select:none}
.upgrade-chk input{width:16px;height:16px;min-width:16px;flex-shrink:0;margin:0}
.upgrade-chk.active{color:var(--teal);font-weight:600}
.fuel-near{color:var(--ok-tx)}
.fuel-mid{color:var(--warn-tx)}
.fuel-far{color:var(--bad-tx)}
.btn-mined-on{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-tx)}
.empty-state{padding:48px 24px;text-align:center;color:var(--text3)}
.empty-state-icon{font-size:36px;margin-bottom:12px}
.empty-state-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-state-sub{font-size:13px;line-height:1.6}
.stats{display:flex;gap:12px}
.stat{text-align:center}
.stat-n{font-size:17px;font-weight:600;font-family:monospace;line-height:1.1}
.stat-l{font-size:10px;color:var(--text2)}
.stat-btn{cursor:pointer;padding:3px 6px;border-radius:var(--rs);border:.5px solid transparent;transition:background .1s}
.stat-btn:active{background:var(--bg3)}
.stat-btn.stat-active{background:var(--ok-bg);border-color:var(--ok-tx)}
.stat-btn.stat-active .stat-l{color:var(--ok-tx)}

.search-row{position:relative;display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1}
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:.5px solid var(--bdr2);border-radius:var(--rs);z-index:50;overflow:hidden}
.ac-item{padding:11px 14px;font-size:15px;cursor:pointer;border-bottom:.5px solid var(--bdr);color:var(--text)}
.ac-item:last-child{border-bottom:none}
.ac-item:active,.ac-item.hover{background:var(--bg3)}

.sys-card{border:.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.sys-card.open{border-color:var(--bdr2)}
.sys-header{display:flex;align-items:center;gap:8px;padding:14px;cursor:pointer}
.sys-card.open .sys-header{background:var(--bg2)}
.sys-name{font-family:monospace;font-size:15px;font-weight:700;flex:1}
.sys-meta{font-size:11px;color:var(--text2);font-family:monospace}
.sys-body{padding:8px 14px 14px}
.sys-info{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:12px;padding:3px 9px;border-radius:20px;background:var(--bg2);color:var(--text2);border:.5px solid var(--bdr);white-space:nowrap}
.chip.warn{background:var(--warn-bg);color:var(--warn-tx)}
.chip.ok{background:var(--ok-bg);color:var(--ok-tx)}
.chip.info{background:var(--info-bg);color:var(--info-tx)}
.chip.revisit{background:var(--ok-bg);color:var(--ok-tx);font-weight:700}

.planet-block{border:.5px solid var(--bdr);border-radius:var(--rs);margin-bottom:8px;overflow:hidden}
.planet-hdr{display:flex;align-items:center;gap:6px;padding:11px 12px;cursor:pointer;background:var(--bg2)}
.planet-hdr:active{background:var(--bg3)}
.pnum{font-size:12px;font-weight:700;font-family:monospace;background:var(--bg3);color:var(--text2);padding:2px 8px;border-radius:4px;flex-shrink:0}
.ptype{font-size:13px;flex:1}
.ptags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--text2);font-family:monospace;white-space:nowrap}
.tag.warn{background:var(--warn-bg);color:var(--warn-tx)}
.tag.ok{background:var(--ok-bg);color:var(--ok-tx)}
.tag.info{background:var(--info-bg);color:var(--info-tx)}
.tag.revisit{background:var(--ok-bg);color:var(--ok-tx);font-weight:700}
.tag.c-low{background:var(--bg3);color:var(--text3)}
.tag.c-mid{background:var(--warn-bg);color:var(--warn-tx)}
.tag.c-high{background:var(--ok-bg);color:var(--ok-tx)}

.planet-body{padding:10px 12px 12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:10px;font-size:13px}
.detail-row{display:flex;justify-content:space-between;align-items:center}
.dlabel{color:var(--text2)}
.dval{font-weight:500;font-family:monospace}

.moon-section{margin-top:8px;border-top:.5px solid var(--bdr);padding-top:8px}
.moon-section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.moon-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border:.5px solid var(--bdr);border-radius:var(--rs);margin-bottom:5px;cursor:pointer}
.moon-row:active{background:var(--bg2)}
.mnum{font-size:11px;font-weight:700;font-family:monospace;color:var(--text3);min-width:52px;flex-shrink:0}
.mtype{font-size:12px;flex:1}
.moon-detail{padding:10px;border:.5px solid var(--bdr);border-top:none;border-radius:0 0 var(--rs) var(--rs);margin-top:-5px;margin-bottom:5px;background:var(--bg2)}

.pip-row{display:flex;gap:2px;align-items:center}
.pip{width:10px;height:10px;border-radius:2px;background:var(--bdr2)}
.pip.safe{background:var(--teal)}
.pip.caution{background:var(--accent)}
.pip.danger{background:var(--bad-tx)}

.form-box{background:var(--bg2);border-radius:var(--r);padding:16px;border:.5px solid var(--bdr2);margin-bottom:10px}
.form-title{font-size:15px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:10px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:400px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
.form-btns{display:flex;gap:8px;margin-top:12px}
.form-btns .btn-primary{flex:1}
.section-sep{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px;padding-top:10px;border-top:.5px solid var(--bdr)}

.map-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;padding:10px 0;border-top:.5px solid var(--bdr);user-select:none}
canvas{display:block;width:100%;border-radius:var(--rs);border:.5px solid var(--bdr);background:var(--bg2)}
.map-legend{font-size:10px;color:var(--text3);font-family:monospace;margin-top:5px;line-height:1.7}

.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:var(--text);color:var(--bg);font-size:28px;line-height:1;display:flex;align-items:center;justify-content:center;border:none;box-shadow:0 3px 14px rgba(0,0,0,.22);cursor:pointer;z-index:100;transition:transform .12s}
.fab:active{transform:scale(.92)}

.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:13px;padding:9px 18px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}

.empty{padding:48px 0;text-align:center;color:var(--text3);font-family:monospace;font-size:13px;line-height:1.9;white-space:pre-line}
.divider{border-top:.5px solid var(--bdr);margin:10px 0 8px}
.logged-date{font-size:11px;color:var(--text3);margin-bottom:10px}
.sys-notes{font-size:13px;color:var(--text2);font-style:italic;margin-bottom:8px}
.export-row{display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:.5px solid var(--bdr);margin-top:16px}
.chevron{font-size:11px;color:var(--text3);flex-shrink:0}

.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-bar .label{font-size:11px;color:var(--text3);flex-shrink:0}
.fpill{font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid var(--bdr2);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:background .1s}
.fpill:active{transform:scale(.97)}
.fpill.on{background:var(--teal);color:#000;border-color:var(--teal);font-weight:600}
.fpill.on.warn{background:var(--accent);color:#000;border-color:var(--accent)}
.sort-sep{width:.5px;height:18px;background:var(--bdr2);flex-shrink:0}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.modal-close{float:right;background:none;border:none;font-size:22px;color:var(--text2);cursor:pointer;padding:0;line-height:1}
.gh-status{font-size:12px;padding:8px 12px;border-radius:var(--rs);margin-top:8px;display:none}
.gh-status.ok{background:var(--ok-bg);color:var(--ok-tx);display:block}
.gh-status.err{background:var(--bad-bg);color:var(--bad-tx);display:block}
.chip.faction{background:var(--info-bg);color:var(--info-tx)}
.gh-ts{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.6}

.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--bg);border-radius:var(--r);padding:20px;width:100%;max-width:320px;border:.5px solid var(--bdr2)}
.confirm-msg{font-size:15px;margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1}
.form-error{display:none;font-size:13px;color:var(--bad-tx);background:var(--bad-bg);border:.5px solid var(--bad-bdr);border-radius:var(--rs);padding:9px 12px;margin-bottom:10px;line-height:1.4}

.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:.5px solid var(--bdr2);position:relative}
.tab{font-size:14px;font-weight:500;padding:10px 18px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;border-radius:0;transition:color .15s}
.tab:active{background:none;transform:none}
.tab.on{color:var(--text);border-bottom-color:var(--teal)}
.tab-dropdown{position:relative;display:inline-block}
.tab-dropdown-menu{display:none;position:absolute;top:calc(100% + 1px);right:0;background:var(--bg);border:.5px solid var(--bdr2);border-radius:var(--rs);z-index:50;min-width:160px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.tab-dropdown-menu.open{display:block}
.tab-dd-item{display:block;width:100%;padding:12px 16px;font-size:14px;font-weight:500;text-align:left;background:none;border:none;color:var(--text2);cursor:pointer;border-bottom:.5px solid var(--bdr)}
.tab-dd-item:last-child{border-bottom:none}
.tab-dd-item:active,.tab-dd-item.sel{background:var(--bg2);color:var(--text)}
.tab-dd-item.sel{color:var(--teal);font-weight:600}

.note-card{border:.5px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.note-src{font-size:11px;color:var(--text3);font-family:monospace;margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.note-src .src-sys{color:var(--teal);font-weight:600}
.note-src .src-body{color:var(--text2)}
.note-text-body{font-size:14px;color:var(--text);line-height:1.6}
.note-text-body mark{background:var(--warn-bg);color:var(--warn-tx);border-radius:2px;padding:0 2px}

.pv-table{width:100%;border-collapse:collapse;font-size:13px}
.pv-table th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:.5px solid var(--bdr2);cursor:pointer;white-space:nowrap;text-align:left;user-select:none;background:var(--bg)}
.pv-table th:active{color:var(--text)}
.pv-table th .sort-arrow{margin-left:4px;opacity:.4;font-size:10px}
.pv-table th.sorted .sort-arrow{opacity:1;color:var(--teal)}
.pv-table td{padding:8px 8px;border-bottom:.5px solid var(--bdr);vertical-align:middle;color:var(--text)}
.pv-table tr:last-child td{border-bottom:none}
.pv-table tr:active td{background:var(--bg2)}
.pv-sys{font-family:monospace;font-size:12px;color:var(--teal);cursor:pointer}
.pv-sys:active{opacity:.7}
.pv-revisit{color:var(--ok-tx);font-weight:700;font-size:13px}
.pv-empty{padding:40px 0;text-align:center;color:var(--text3);font-size:13px;font-family:monospace}
.pv-wrap{overflow-x:auto;border:.5px solid var(--bdr);border-radius:var(--rs)}

.gh-banner{display:flex;align-items:center;gap:8px;margin-top:8px;padding:10px 14px;border:.5px solid var(--ok-tx);border-radius:var(--rs);background:var(--ok-bg);cursor:pointer}
.gh-banner-icon{font-size:14px;color:var(--ok-tx);flex-shrink:0}
.gh-banner-label{font-size:12px;color:var(--ok-tx);font-weight:600;flex-shrink:0}
.gh-banner-ts{font-size:12px;color:var(--ok-tx);font-family:monospace}

.tag-ok{background:var(--ok-bg);color:var(--ok-tx)}
.tag-info{background:var(--info-bg);color:var(--info-tx)}
.tag-warn{background:var(--warn-bg);color:var(--warn-tx)}
.tag-bad{background:var(--bad-bg);color:var(--bad-tx)}

.tools-section{margin-bottom:24px}
.tools-section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:6px;border-bottom:.5px solid var(--bdr)}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:400px){.calc-grid{grid-template-columns:1fr}}
.score-display{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--r);border:.5px solid var(--bdr2);background:var(--bg2);margin-top:4px}
.score-big{font-size:36px;font-weight:700;font-family:monospace;line-height:1;flex-shrink:0}
.score-detail{font-size:12px;color:var(--text2);line-height:1.7}
.minerals-search{margin-bottom:10px}
.min-table{width:100%;border-collapse:collapse;font-size:13px}
.min-table th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:.5px solid var(--bdr2);text-align:left;background:var(--bg)}
.min-table td{padding:7px 8px;border-bottom:.5px solid var(--bdr);color:var(--text)}
.min-table tr:last-child td{border-bottom:none}
.min-wrap{border:.5px solid var(--bdr);border-radius:var(--rs);overflow:hidden}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────
const SOL_X = 175.2, SOL_Y = 145.0;
const PLANET_TYPES = ['Unknown','Acid World','Airless Rock','Alkali World','Auric World','Azure World','Carbide World','Chlorine World','Chondrite World','Cimmerian World','Copper World','Crimson World','Cyanic World','Dust World','Emerald World','Gas Giant','Green World','Halide World','Hydrocarbon World','Icy','Infrared World','Iodine World','Lanthanide World','Magma World','Magnetic World','Maroon World','Metal World','Noble World','Oolite World','Opalescent World','Organic World','Pellucid World','Plutonic World','Primordial World','Purple World','Quasi-Degenerate World','Rainbow World','Radioactive World','Reducing','Redux World','Ruby World','Sapphire World','Selenic World','Shattered','Super Dense World','Telluric World','Treasure World','Ultramarine World','Ultraviolet World','Urea World','Vinylogous World','Water World','Xenolithic World','Yttric World'];
const STAR_COLORS  = ['Yellow','Blue','Orange','Red','White','Brown Dwarf','Binary','Unknown'];
const HAZ          = [0,1,2,3,4,5,6,7,8];
const CARGO_OPTS   = [0,-1,1,2,3,4,5,6,8,25];
const CARGO_LBL    = ['— unsurveyed','N/A – None','1 – Common','2 – Corrosive','3 – Base Metal','4 – Noble Gas','5 – Rare Earth','6 – Precious Metal','8 – Radioactive','25 – Exotic'];
const RESOURCE_NAME = {0:'—','-1':'N/A',1:'Common',2:'Corrosive',3:'Base Metal',4:'Noble Gas',5:'Rare Earth',6:'Precious Metal',8:'Radioactive',25:'Exotic'};

// ── Minerals database (name → category → RU value) ────────────────
const MINERALS = [
  // Common (1)
  {name:'Carbon',      cat:'Common',         val:1},
  {name:'Hydrogen',    cat:'Common',         val:1},

// ── Visit score calculator ─────────────────────────────────────────
// Mineral scores — values 6+ get steeper curve to better differentiate high-value bodies
const CARGO_SCORE = {0:0,'-1':0,1:4,2:8,3:14,4:24,5:48,6:65,8:78,25:90};
function visitScore(b, fuelDist){
  let score = CARGO_SCORE[b.cargoValue] || 0;
  if(b.bioLifeforms) score += 15;
  if(b.mustVisit) score += 10;
  const fd = typeof fuelDist === 'number' ? fuelDist : 0;
  score -= Math.max(0, fd - 20) * 0.3;
  // Hazard — respect shields
  const hz = (UPGRADES.weather?0:(b.weather||0)) + (UPGRADES.tectonic?0:(b.tectonics||0));
  if(hz >= 8) score -= (hz - 7) * 8;
  // Temperature — respect heat shield
  if(!UPGRADES.heat){
    const temp = parseFloat(b.temperature);
    if(!isNaN(temp)){
      if(temp >= 2000) score -= 30;
      else if(temp >= 1000) score -= 20;
      else if(temp >= 500) score -= 10;
      else if(temp < -200) score -= 5;
    }
  }
  return Math.max(0, Math.min(100, Math.round(score)));
}
function visitBand(score){
  if(score >= 70) return {label:'High Priority', cls:'ok'};
  if(score >= 50) return {label:'Worth Visiting', cls:'info'};
  if(score >= 30) return {label:'Marginal', cls:'warn'};
  if(score >= 10) return {label:'Low Priority', cls:''};
  return {label:'Skip', cls:'bad'};
}
// System-level score: blends best single body (60%) with aggregate wealth (40%)
// mustVisit adds directly to the final score (+8 per flagged body) so it's always visible
const RICHNESS_CEILING = 300;
function sysVisitScore(sys){
  const fd=typeof fuelDist(sys.x,sys.y)==='number'?fuelDist(sys.x,sys.y):0;
  const bodies=[...sys.planets,...sys.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];
  if(!bodies.length) return null;
  const best=Math.max(...bodies.map(b=>visitScore(b,fd)));
  const mineralSum=bodies.reduce((s,b)=>s+(CARGO_SCORE[b.cargoValue]||0),0);
  const aggScore=Math.min(100,Math.round(mineralSum/RICHNESS_CEILING*100));
  const mustVisitBonus=bodies.filter(b=>b.mustVisit).length*8;
  return Math.min(100,Math.round(best*0.60+aggScore*0.40)+mustVisitBonus);
}

function getFiltered(){
  let list=S.systems.slice();
  const q=UI.search.toLowerCase();
  if(q) list=list.filter(s=>s.name.toLowerCase().includes(q));
  if(UI.filterRevisit) list=list.filter(s=>{
    const bodies=[...s.planets,...s.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];
    return bodies.some(b=>isRevisitable(b));
  });
  if(UI.filterBio) list=list.filter(s=>{
    const bodies=[...s.planets,...s.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];
    return bodies.some(b=>b.bioLifeforms);
  });
  if(UI.filterNotes) list=list.filter(s=>{
    const bodies=[...s.planets,...s.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];
    return (s.notes&&s.notes.trim()) || bodies.some(b=>b.notes&&b.notes.trim());
  });
  if(UI.filterTreasure) list=list.filter(s=>{
    const bodies=[...s.planets,...s.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];
    return bodies.some(b=>b.type==='Treasure World');
  });
  if(UI.filterHomeworld) list=list.filter(s=>s.faction&&s.faction!=='—');
  if(UI.sortBy==='dist') list.sort((a,b)=>distSol(a.x,a.y)-distSol(b.x,b.y));
  else if(UI.sortBy==='cargo') list.sort((a,b)=>{
    const maxC=s=>{const bodies=[...s.planets,...s.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];return bodies.reduce((m,b)=>Math.max(m,b.cargoValue||0),0);};
    return maxC(b)-maxC(a);
  });
  else if(UI.sortBy==='score') list.sort((a,b)=>{
    return (sysVisitScore(b)||0)-(sysVisitScore(a)||0);
  });
  else if(UI.sortBy==='logged') list.sort((a,b)=>{
    const ta=a.addedAt?new Date(a.addedAt).getTime():0;
    const tb=b.addedAt?new Date(b.addedAt).getTime():0;
    return tb-ta; // newest first
  });
  else list.sort((a,b)=>a.name.localeCompare(b.name));
  return list;
}

// ── Helpers ───────────────────────────────────────────────────────
function distSol(x,y){
  if(x===''||y===''||x==null||y==null) return '—';
  return Math.round(Math.sqrt(Math.pow(x-SOL_X,2)+Math.pow(y-SOL_Y,2))*10)/10;
}
function fuelDist(x,y){
  const d=distSol(x,y);
  if(d==='—') return '—';
  return Math.round(d/10*10)/10;
}
function fmtDate(iso){
  if(!iso) return '—';
  try{
    // Old entries were stored as toLocaleDateString() e.g. "4/22/2026" — no time component
    // Detect by absence of 'T' (ISO) or ':' (locale with time)
    if(!iso.includes('T') && !iso.includes(':')){
      return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }
    return new Date(iso).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZoneName:'short'});
  }catch(e){return iso;}
}
function cargoClass(v){if(v<=0) return 'c-low'; return v===25?'c-high':v>=6?'c-high':v>=3?'c-mid':'c-low'}
function cargoTier(v){if(v<=0) return 'low'; return v===25?'high':v>=6?'high':v>=3?'mid':'low'}

function isRevisitable(b){
  if(b.mustVisit) return true;
  if((b.cargoValue||0) < 5) return false;
  const hz=(UPGRADES.weather?0:(b.weather||0))+(UPGRADES.tectonic?0:(b.tectonics||0));
  if(hz >= 8) return false;
  if(!UPGRADES.heat){
    const temp=parseFloat(b.temperature);
    if(!isNaN(temp) && temp >= 1000) return false;
  }
  return true;
}

// ── Swipe to dismiss forms ────────────────────────────────────────
function swipeToDismiss(boxEl, onDismiss){
  let startY=0, startX=0, scrollTop=0;
  boxEl.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
    scrollTop=boxEl.scrollTop;
  },{passive:true});
  boxEl.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-startY;
    const dx=Math.abs(e.changedTouches[0].clientX-startX);
    // Only dismiss if: swipe is downward, mostly vertical, box is scrolled to top, and swipe is large
    if(dy>80&&dx<40&&scrollTop<=0) onDismiss();
  },{passive:true});
}

function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs) for(const[k,v]of Object.entries(attrs)){
    if(v==null) continue;
    if(k==='class') e.className=v;
    else if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,String(v));
  }
  for(const c of kids.flat(4)) if(c!=null) e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  return e;
}
function field(labelText,input){return el('div',{class:'field'},el('label',{},labelText),input)}
function mkSel(opts,labels,val,cb){
  const s=el('select',{onchange:e=>cb(e.target.value)});
  opts.forEach((o,i)=>{
    const opt=el('option',{value:String(o)},labels?labels[i]:String(o));
    if(String(o)===String(val)) opt.selected=true;
    s.appendChild(opt);
  });
  return s;
}
function mkInp(type,val,cb,attrs={}){
  const i=el('input',{type,...attrs});
  i.value=String(val??'');
  i.addEventListener('input',e=>cb(e.target.value));
  return i;
}
function pipBar(val,max=8){
  // Colors based on pip position: 1-3 safe (green), 4-6 caution (amber), 7-8 danger (red)
  const row=el('div',{class:'pip-row'});
  for(let i=1;i<=max;i++){
    let cls='pip';
    if(i<=val) cls+= i>=7?' danger': i>=4?' caution':' safe';
    row.appendChild(el('div',{class:cls}));
  }
  return row;
}
function resourceBadge(v){
  if(v===0) return el('span',{class:'dval'},'—');
  if(v===-1) return el('span',{class:'tag c-low'},'N/A');
  const name=RESOURCE_NAME[v]||String(v);
  const cls=v===25?'tag c-high':v>=6?'tag c-high':v>=3?'tag c-mid':'tag c-low';
  return el('span',{class:cls},v===25?name+' ✦✦✦':v>=6?name+' ✦':name);
}

  if(isOpen){
    const body=el('div',{class:'planet-body'});
    const grid=el('div',{class:'detail-grid'});
    [['Position',planet.order?'#'+planet.order:'—'],
     ['Weather',planet.weather>0?pipBar(planet.weather):'—'],
     ['Tectonics',planet.tectonics>0?pipBar(planet.tectonics):'—'],
     ['Temperature',planet.temperature?String(planet.temperature)+'°':'—'],
     ['Max resource',resourceBadge(planet.cargoValue)],

     ['Homeworld',planet.homeworld?'Yes':'No'],
     ['Must Visit',planet.mustVisit?'★ Yes':'No']
    ].forEach(([lbl,val])=>{
      const r=el('div',{class:'detail-row'},el('span',{class:'dlabel'},lbl));

    const editBtn=el('button',{class:'btn-sm',style:{marginBottom:'8px'}},'Edit planet');

    block.appendChild(body);
  }
  return block;

// ── System card ───────────────────────────────────────────────────
function sysCard(sys){
  const isOpen=UI.openSys.has(sys.id);
  const dist=distSol(sys.x,sys.y);
  const fuel=fuelDist(sys.x,sys.y);
  const fd=typeof fuel==='number'?fuel:0;
  const sysScore=sysVisitScore(sys);
  const sysBand=sysScore!==null?visitBand(sysScore):null;

  const card=el('div',{class:'sys-card'+(isOpen?' open':''),'data-sys':sys.id});

  const delBtn=el('button',{class:'btn-del'},'✕');
  delBtn.addEventListener('click',e=>{e.stopPropagation();delSys(sys.id);});

  // Fuel color: green < 20, amber 20-50, red > 50
  const fuelClass=typeof fuel!=='number'?'':'fuel-'+(fuel<20?'near':fuel<=50?'mid':'far');
  const minedBadge=sys.mined?el('span',{class:'tag tag-ok',style:{fontSize:'10px',marginLeft:'4px'}},'⛏ mined'):null;

  const nameRow=el('div',{style:{display:'flex',alignItems:'baseline',gap:'6px',flexWrap:'wrap'}},
    el('div',{class:'sys-name'},sys.name),
    sysScore!==null?el('span',{class:'tag tag-'+(sysBand.cls||''),style:{fontSize:'10px',fontWeight:'700',verticalAlign:'middle'}},String(sysScore)):null,
    minedBadge
  );

  const hdr=el('div',{class:'sys-header'},
    el('div',{style:{flex:'1'}},
      nameRow,
      el('div',{class:'sys-meta'},`(${sys.x}, ${sys.y}) · ${dist} dist · `,el('span',{class:fuelClass},`${fuel} fuel`))
    ),
    el('span',{class:'chevron'},isOpen?'▲':'▼'),
    delBtn
  );
  hdr.addEventListener('click',()=>{
    if(isOpen) UI.openSys.delete(sys.id); else UI.openSys.add(sys.id);
    UI.addPlanet=null;UI.addMoon=null;render();
  });
  card.appendChild(hdr);

  if(!isOpen) return card;

  if(UI.editSys===sys.id){
    const wrap=el('div',{style:{padding:'8px 14px'}});
    wrap.appendChild(sysForm(sys,
      d=>updateSys(sys.id,d),
      ()=>{UI.editSys=null;render();}
    ));
    card.appendChild(wrap);
    return card;
  }

  const body=el('div',{class:'sys-body'});

  // Info chips
  const chips=el('div',{class:'sys-info'});
  chips.appendChild(el('span',{class:'chip'},sys.starColor+' star'));
  if(sys.faction&&sys.faction!=='—') chips.appendChild(el('span',{class:'chip faction'},sys.faction));
  chips.appendChild(el('span',{class:'chip info'},`${dist} from Sol · ${fuel} fuel units`));
  chips.appendChild(el('span',{class:'chip'},`${sys.planets.length} planet${sys.planets.length!==1?'s':''}`));
  const totalMoons=sys.planets.reduce((n,p)=>n+(p.moons||[]).length,0);
  if(totalMoons>0) chips.appendChild(el('span',{class:'chip'},`${totalMoons} moon${totalMoons!==1?'s':''}`));
  const allBodies=[...sys.planets,...sys.planets.reduce((a,p)=>a.concat(p.moons||[]),[])];
  const maxC=allBodies.reduce((m,b)=>Math.max(m,b.cargoValue||0),0);
  const bioN=allBodies.filter(b=>b.bioLifeforms).length;
  if(maxC>0){
    const rName=RESOURCE_NAME[maxC]||String(maxC);
    chips.appendChild(el('span',{class:`chip ${cargoClass(maxC)}`},`best: ${rName}`));
  }
  if(allBodies.some(b=>isRevisitable(b))) chips.appendChild(el('span',{class:'chip revisit'},'revisit'));
  if(bioN>0) chips.appendChild(el('span',{class:'chip ok'},`bio on ${bioN} bod${bioN>1?'ies':'y'}`));
  const hwN=allBodies.filter(b=>b.homeworld).length;
  if(hwN>0) chips.appendChild(el('span',{class:'chip info'},'homeworld'));
  body.appendChild(chips);

  if(sys.notes) body.appendChild(el('div',{class:'sys-notes'},sys.notes));
  body.appendChild(el('div',{class:'logged-date'},'Logged '+fmtDate(sys.addedAt)));

  const btnRow=el('div',{style:{display:'flex',gap:'8px',marginBottom:'10px',flexWrap:'wrap'}});
  const editSysBtn=el('button',{class:'btn-sm'},'Edit system info');
  editSysBtn.addEventListener('click',()=>{UI.editSys=sys.id;render();});
  const minedBtn=el('button',{class:'btn-sm'+(sys.mined?' btn-mined-on':'')},sys.mined?'⛏ Mined ✓':'⛏ Mark as Mined');
  minedBtn.addEventListener('click',()=>{
    sys.mined=!sys.mined;
    persist();
    render();
  });
  btnRow.appendChild(editSysBtn);
  btnRow.appendChild(minedBtn);
  body.appendChild(btnRow);

  const sortedPlanets=[...sys.planets].sort((a,b)=>{
    if(!a.order&&!b.order) return 0;
    if(!a.order) return 1;
    if(!b.order) return -1;
    return a.order-b.order;
  });
  sortedPlanets.forEach((p,i)=>body.appendChild(planetBlock(p,p.order||(i+1),sys)));

  if(UI.addPlanet===sys.id){
    body.appendChild(bodyForm(null,'Add Planet',
      d=>addPlanet(sys.id,d),
      ()=>{UI.addPlanet=null;render();},'planet'
    ));
  } else {
    const addPBtn=el('button',{class:'btn-full'},'+ Add planet');
    addPBtn.addEventListener('click',()=>{UI.addPlanet=sys.id;UI.addMoon=null;render();});
    body.appendChild(addPBtn);
  }

  const div=el('div',{class:'divider'});
  const dBtn=el('button',{class:'btn-sm btn-danger'},'Delete system');
  dBtn.addEventListener('click',()=>delSys(sys.id));
  div.appendChild(dBtn);
  body.appendChild(div);
  card.appendChild(body);
  return card;
}

// ── Render systems list only (preserves search focus) ────────────
function renderList(){
  const container=document.getElementById('sys-list');
  if(!container){render();return;}
  container.innerHTML='';
  const filtered=getFiltered();
  // Update collapse/expand buttons
  const collapseAll=document.getElementById('collapse-all');
  const expandAll=document.getElementById('expand-all');
  if(collapseAll) collapseAll.disabled=UI.openSys.size===0;
  if(expandAll) expandAll.disabled=filtered.length===0||UI.openSys.size===filtered.length;
  if(S.systems.length===0){
    // Empty state
    const es=el('div',{class:'empty-state'});
    es.appendChild(el('div',{class:'empty-state-icon'},'🌌'));
    es.appendChild(el('div',{class:'empty-state-title'},'No systems logged yet'));
    es.appendChild(el('div',{class:'empty-state-sub'},'Tap + below to log your first star system.\nThe galaxy awaits.'));
    container.appendChild(es);
  } else if(filtered.length===0){
    container.appendChild(el('div',{class:'empty'},'No matches.'));
  } else {
    filtered.forEach(s=>container.appendChild(sysCard(s)));
  }
}

function updateAC(query){
  // remove existing dropdown
  const existing=document.getElementById('ac-drop');
  if(existing) existing.remove();
  if(!query||!query.trim()) return;
  const q=query.toLowerCase();
  const matches=S.systems.filter(s=>s.name.toLowerCase().includes(q)&&s.name.toLowerCase()!==q).slice(0,6);
  if(matches.length===0) return;
  const wrap=document.querySelector('.search-row');
  if(!wrap) return;
  const drop=el('div',{id:'ac-drop',class:'ac-drop'});
  matches.forEach(s=>{
    const item=el('div',{class:'ac-item'},s.name);
    item.addEventListener('mousedown',e=>{
      e.preventDefault();
      UI.search=s.name;
      const inp=document.getElementById('search-input');
      if(inp){inp.value=s.name;inp.focus();}
      drop.remove();
      renderList();
    });
    drop.appendChild(item);
  });
  wrap.appendChild(drop);
}

  const fileInp=mkInp('text',GH.file,v=>GH.file=v||'sc2-log.json',{placeholder:'sc2-log.json'});
  modal.appendChild(field('File path in repo',fileInp));

  const status=el('div',{class:'gh-status',id:'gh-status'});
  modal.appendChild(status);

  function setStatus(msg,ok){
    status.textContent=msg;
    status.className='gh-status '+(ok?'ok':'err');
  }

  const pushBtn=el('button',{class:'btn-primary',style:{marginRight:'8px'}},'↑ Push to GitHub');
  pushBtn.addEventListener('click',async()=>{
    if(!GH.token||!GH.owner||!GH.repo){setStatus('Fill in all fields first.',false);return;}
    saveGH();
    pushBtn.textContent='Pushing…';pushBtn.disabled=true;
    try{
      const path=GH.file||'sc2-log.json';
      const api=`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${path}`;
      // get existing SHA if file exists
      let sha='';
      try{const r=await fetch(api,{headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json'}});if(r.ok){const j=await r.json();sha=j.sha||'';}}catch(e){}
      const content=btoa(unescape(encodeURIComponent(JSON.stringify(S,null,2))));
      const body={message:'SC2 Explorer sync '+new Date().toISOString(),content};
      if(sha) body.sha=sha;
      const res=await fetch(api,{method:'PUT',headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
      if(res.ok){
        GH.lastPush=new Date().toLocaleString();
        saveGH();
        setStatus('Pushed successfully! · '+GH.lastPush,true);
        toast('Pushed to GitHub!');
      }
      else{const j=await res.json();setStatus('Error: '+(j.message||res.status),false);}
    }catch(e){setStatus('Network error: '+e.message,false);}
    pushBtn.textContent='↑ Push to GitHub';pushBtn.disabled=false;
  });

  const pullBtn=el('button',{class:'btn-sm'},'↓ Pull from GitHub');
  pullBtn.addEventListener('click',async()=>{
    if(!GH.token||!GH.owner||!GH.repo){setStatus('Fill in all fields first.',false);return;}
    saveGH();
    pullBtn.textContent='Pulling…';pullBtn.disabled=true;
    try{
      const path=GH.file||'sc2-log.json';
      const api=`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${path}`;
      const res=await fetch(api,{headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json'}});
      if(res.ok){
        const j=await res.json();
        const text=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
        const parsed=JSON.parse(text);
        if(parsed.systems){
          S=parsed;persist();
          GH.lastPull=new Date().toLocaleString();
          saveGH();
          UI.ghOpen=false;render();toast('Pulled from GitHub!');
        }
        else setStatus('File does not look like SC2 data.',false);
      } else {
        const j=await res.json();setStatus('Error: '+(j.message||res.status),false);
      }
    }catch(e){setStatus('Network error: '+e.message,false);}
    pullBtn.textContent='↓ Pull from GitHub';pullBtn.disabled=false;
  });

  modal.appendChild(el('div',{class:'form-btns'},pushBtn,pullBtn));

  if(GH.lastPush||GH.lastPull){
    const ts=el('div',{class:'gh-ts'});
    if(GH.lastPush) ts.appendChild(el('div',{},'↑ Last pushed: '+GH.lastPush));
    if(GH.lastPull) ts.appendChild(el('div',{},'↓ Last pulled: '+GH.lastPull));
    modal.appendChild(ts);
  }

  modal.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'12px',lineHeight:'1.6'}},'Need a token? Go to github.com → Settings → Developer settings → Personal access tokens → Generate new token. Enable the "repo" scope.'));

  bg.appendChild(modal);
  bg.addEventListener('click',e=>{if(e.target===bg){UI.ghOpen=false;render();}});
  return bg;
}

// ── Notes Tab ─────────────────────────────────────────────────────
function buildNotesTab(){
  const frag=document.createDocumentFragment();

  // Search bar
  const si=el('input',{type:'text',id:'notes-search',placeholder:'Search notes...',autocomplete:'off'});
  si.value=UI.notesSearch;
  si.addEventListener('input',e=>{
    UI.notesSearch=e.target.value;
    const list=document.getElementById('notes-list');
    if(list) renderNotesList(list,e.target.value);
  });
  frag.appendChild(el('div',{class:'search-row',style:{marginBottom:'12px'}},si));

  const list=el('div',{id:'notes-list'});
  renderNotesList(list,UI.notesSearch);
  frag.appendChild(list);
  return frag;
}

function renderNotesList(container,query){
  container.innerHTML='';
  const q=(query||'').toLowerCase().trim();

  // Collect all notes entries: {sysName, bodyLabel, note}
  const entries=[];
  S.systems.forEach(sys=>{
    if(sys.notes&&sys.notes.trim()){
      entries.push({sysName:sys.name,bodyLabel:'Star system',note:sys.notes.trim(),sysId:sys.id});
    }
    const sortedP=[...sys.planets].sort((a,b)=>(a.order||999)-(b.order||999));
    sortedP.forEach(p=>{
      if(p.notes&&p.notes.trim()){
        const lbl='Planet '+(p.order||'?')+' · '+p.type;
        entries.push({sysName:sys.name,bodyLabel:lbl,note:p.notes.trim(),sysId:sys.id,planetId:p.id});
      }
      const sortedM=[...(p.moons||[])].sort((a,b)=>(a.order||999)-(b.order||999));
      sortedM.forEach(m=>{
        if(m.notes&&m.notes.trim()){
          const lbl='Moon '+(m.order||'?')+' of Planet '+(p.order||'?')+' · '+m.type;
          entries.push({sysName:sys.name,bodyLabel:lbl,note:m.notes.trim(),sysId:sys.id,planetId:p.id});
        }
      });
    });
  });

  // Filter by query
  const filtered=q
    ? entries.filter(e=>e.note.toLowerCase().includes(q)||e.sysName.toLowerCase().includes(q)||e.bodyLabel.toLowerCase().includes(q))
    : entries;

  if(filtered.length===0){
    container.appendChild(el('div',{class:'empty'},
      entries.length===0?'No notes logged yet.':'No notes match your search.'));
    return;
  }

  filtered.forEach(e=>{
    const card=el('div',{class:'note-card'});
    // Source line
    const src=el('div',{class:'note-src'});
    const sysSpan=el('span',{class:'src-sys'});
    sysSpan.textContent=e.sysName;
    sysSpan.style.cursor='pointer';
    sysSpan.addEventListener('click',()=>{
      UI.openSys.add(e.sysId);
      UI.scrollToPlanet=e.planetId||null;
      UI.tab='systems';
      render();
      setTimeout(()=>{
        const target=e.planetId
          ? document.querySelector('[data-planet="'+e.planetId+'"]')
          : document.querySelector('[data-sys="'+e.sysId+'"]');
        if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
      },80);
    });
    src.appendChild(sysSpan);
    src.appendChild(el('span',{style:{color:'var(--text3)'}},'>'));
    src.appendChild(el('span',{class:'src-body'},e.bodyLabel));
    card.appendChild(src);

    // Note text with keyword highlighting
    const textDiv=el('div',{class:'note-text-body'});
    if(q){
      const parts=e.note.split(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'));
      parts.forEach(part=>{
        if(part.toLowerCase()===q) textDiv.appendChild(el('mark',{},part));
        else textDiv.appendChild(document.createTextNode(part));
      });
    } else {
      textDiv.textContent=e.note;
    }
    card.appendChild(textDiv);
    container.appendChild(card);
  });
}

// ── Planets Visited Tab ───────────────────────────────────────────
function buildPlanetsTab(){
  const frag=document.createDocumentFragment();

  // Flatten all planets and moons into rows
  const rows=[];
  S.systems.forEach(sys=>{
    const fuel=fuelDist(sys.x,sys.y);
    const sortedP=[...sys.planets].sort((a,b)=>(a.order||999)-(b.order||999));
    sortedP.forEach(p=>{
      rows.push({sysId:sys.id,sysName:sys.name,designator:String(p.order||'?'),type:p.type,revisit:isRevisitable(p),cargo:p.cargoValue||0,fuel:fuel,_fuelNum:typeof fuel==='number'?fuel:9999,_order:p.order||999});
      const sortedM=[...(p.moons||[])].sort((a,b)=>(a.order||999)-(b.order||999));
      sortedM.forEach(m=>{
        rows.push({sysId:sys.id,sysName:sys.name,designator:(p.order||'?')+'.'+( m.order||'?'),type:m.type,revisit:isRevisitable(m),cargo:m.cargoValue||0,fuel:fuel,_fuelNum:typeof fuel==='number'?fuel:9999,_order:(p.order||999)+((m.order||999)/1000)});
      });
    });
  });

  // Sort
  const sortedRows=[...rows].sort((a,b)=>{
    let av,bv;
    if(UI.pvSort==='system'){av=a.sysName.toLowerCase();bv=b.sysName.toLowerCase();}
    else if(UI.pvSort==='designator'){av=a._order;bv=b._order;}
    else if(UI.pvSort==='type'){av=a.type.toLowerCase();bv=b.type.toLowerCase();}
    else if(UI.pvSort==='revisit'){av=a.revisit?0:1;bv=b.revisit?0:1;}
    else if(UI.pvSort==='max'){av=-(a.cargo||0);bv=-(b.cargo||0);}
    else if(UI.pvSort==='fuel'){av=a._fuelNum;bv=b._fuelNum;}
    else {av=a.sysName.toLowerCase();bv=b.sysName.toLowerCase();}
    if(av<bv) return -UI.pvDir;
    if(av>bv) return UI.pvDir;
    return 0;
  });

  if(rows.length===0){
    frag.appendChild(el('div',{class:'pv-empty'},'No planets logged yet.'));
    return frag;
  }

  const cols=[
    {key:'system',label:'Star System'},
    {key:'designator',label:'Planet'},
    {key:'type',label:'Type'},
    {key:'revisit',label:'Revisit'},
    {key:'max',label:'Max'},
    {key:'fuel',label:'Fuel Dist'},
  ];

  const wrap=el('div',{class:'pv-wrap'});
  const table=el('table',{class:'pv-table'});
  const thead=el('tr',{});
  cols.forEach(c=>{
    const isSorted=UI.pvSort===c.key;
    const th=el('th',{class:isSorted?'sorted':''},c.label,el('span',{class:'sort-arrow'},isSorted?(UI.pvDir===1?'▼':'▲'):'▼'));
    th.addEventListener('click',()=>{
      if(UI.pvSort===c.key) UI.pvDir*=-1;
      else {UI.pvSort=c.key;UI.pvDir=1;}
      render();
    });
    thead.appendChild(th);
  });
  table.appendChild(el('thead',{},thead));

  const tbody=el('tbody',{});
  sortedRows.forEach(row=>{
    const tr=el('tr',{});
    const sysCell=el('td',{});
    const sysSpan=el('span',{class:'pv-sys'},row.sysName);
    sysSpan.addEventListener('click',()=>{UI.openSys.add(row.sysId);UI.tab='systems';render();window.scrollTo({top:0,behavior:'smooth'});});
    sysCell.appendChild(sysSpan);
    tr.appendChild(sysCell);
    tr.appendChild(el('td',{},row.designator));
    tr.appendChild(el('td',{},row.type));
    tr.appendChild(el('td',{},row.revisit?el('span',{class:'pv-revisit'},'✦'):''));
    tr.appendChild(el('td',{style:{fontFamily:'monospace'}},row.cargo>0?String(row.cargo):'—'));
    tr.appendChild(el('td',{style:{fontFamily:'monospace'}},String(row.fuel)));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  frag.appendChild(wrap);

  frag.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'8px',fontFamily:'monospace'}},`${rows.length} bodies logged · tap star name to jump to system`));
  return frag;
}

// ── Calculator Tab ────────────────────────────────────────────────
function buildCalculatorTab(){
  const frag=document.createDocumentFragment();
  const calcSection=el('div',{class:'tools-section'});
  calcSection.appendChild(el('div',{class:'tools-section-title'},'Visit Calculator'));

  const state={cargoValue:0,bio:false,weather:0,tectonics:0,temperature:'',fuel:''};

  const scoreEl=el('div',{class:'score-big'},'—');
  const bandEl=el('span',{style:{fontSize:'14px',fontWeight:'600'}},'Enter values below');
  const detailEl=el('div',{class:'score-detail'});
  const display=el('div',{class:'score-display'},scoreEl,el('div',{},bandEl,detailEl));
  calcSection.appendChild(display);

  function recalc(){
    const fd=parseFloat(state.fuel)||0;
    const b={cargoValue:state.cargoValue,bioLifeforms:state.bio,weather:state.weather,tectonics:state.tectonics,temperature:state.temperature};
    const vs=visitScore(b,fd);
    const band=visitBand(vs);
    scoreEl.textContent=String(vs);
    bandEl.textContent=band.label;
    bandEl.className=band.cls?'tag tag-'+band.cls:'tag';
    const ms=CARGO_SCORE[state.cargoValue]||0;
    const bs=state.bio?15:0;
    const fp=Math.round(fd*0.5);
    const hp=(state.weather+state.tectonics)*4;
    const temp=parseFloat(state.temperature);
    const tp=!isNaN(temp)?(temp>=2000?30:temp>=1000?20:temp>=500?10:temp<-200?5:0):0;
    detailEl.textContent=`Mineral +${ms}  Bio +${bs}  Fuel −${fp}  Hazard −${hp}  Temp −${tp}`;
  }

  const grid=el('div',{class:'calc-grid'});
  const cargoSel=mkSel(CARGO_OPTS,CARGO_LBL,state.cargoValue,v=>{state.cargoValue=+v;recalc();});
  grid.appendChild(el('div',{},el('label',{style:{fontSize:'12px',color:'var(--text2)',display:'block',marginBottom:'4px'}},'Max resource'),cargoSel));
  const bioSel=mkSel(['No','Yes'],null,'No',v=>{state.bio=v==='Yes';recalc();});
  grid.appendChild(el('div',{},el('label',{style:{fontSize:'12px',color:'var(--text2)',display:'block',marginBottom:'4px'}},'Bio lifeforms'),bioSel));
  const wSel=mkSel(HAZ,null,0,v=>{state.weather=+v;recalc();});
  grid.appendChild(el('div',{},el('label',{style:{fontSize:'12px',color:'var(--text2)',display:'block',marginBottom:'4px'}},'Weather'),wSel));
  const tSel=mkSel(HAZ,null,0,v=>{state.tectonics=+v;recalc();});
  grid.appendChild(el('div',{},el('label',{style:{fontSize:'12px',color:'var(--text2)',display:'block',marginBottom:'4px'}},'Tectonics'),tSel));
  const tempInp=mkInp('number','',v=>{state.temperature=v;recalc();},{placeholder:'e.g. 220'});
  grid.appendChild(el('div',{},el('label',{style:{fontSize:'12px',color:'var(--text2)',display:'block',marginBottom:'4px'}},'Temperature'),tempInp));
  const fuelInp=mkInp('number','',v=>{state.fuel=v;recalc();},{placeholder:'e.g. 16.5',inputmode:'decimal'});
  grid.appendChild(el('div',{},el('label',{style:{fontSize:'12px',color:'var(--text2)',display:'block',marginBottom:'4px'}},'Fuel distance'),fuelInp));
  calcSection.appendChild(grid);

  calcSection.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px',lineHeight:'1.6'}},
    '70–100 High Priority · 50–69 Worth Visiting · 30–49 Marginal · 10–29 Low Priority · 0–9 Skip'));
  frag.appendChild(calcSection);
  return frag;
}

// ── Minerals Tab ──────────────────────────────────────────────────
function buildMineralsTab(){
  const frag=document.createDocumentFragment();
  const minSection=el('div',{class:'tools-section'});
  minSection.appendChild(el('div',{class:'tools-section-title'},'Minerals Reference'));

  const minSearch=el('input',{type:'text',class:'minerals-search',placeholder:'Search mineral name or category...',autocomplete:'off'});
  let minQuery='';
  const minTableWrap=el('div',{class:'min-wrap'});

  function renderMinerals(){
    minTableWrap.innerHTML='';
    const q=minQuery.toLowerCase();
    const filtered=MINERALS.filter(m=>!q||m.name.toLowerCase().includes(q)||m.cat.toLowerCase().includes(q));
    if(filtered.length===0){
      minTableWrap.appendChild(el('div',{style:{padding:'20px',textAlign:'center',color:'var(--text3)',fontSize:'13px'}},'No minerals found.'));
      return;
    }
    const table=el('table',{class:'min-table'});
    table.appendChild(el('thead',{},el('tr',{},el('th',{},'Mineral'),el('th',{},'Category'),el('th',{},'RU Value'))));
    const tbody=el('tbody',{});
    filtered.forEach(m=>{
      const valClass=m.val===25?'c-high':m.val>=6?'c-high':m.val>=3?'c-mid':'c-low';
      tbody.appendChild(el('tr',{},
        el('td',{style:{fontWeight:'500'}},m.name),
        el('td',{style:{color:'var(--text2)'}},m.cat),
        el('td',{},el('span',{class:`tag ${valClass}`},String(m.val)))
      ));
    });
    table.appendChild(tbody);
    minTableWrap.appendChild(table);
  }

  minSearch.addEventListener('input',e=>{minQuery=e.target.value;renderMinerals();});
  renderMinerals();
  minSection.appendChild(minSearch);
  minSection.appendChild(minTableWrap);
  minSection.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'6px'}},`${MINERALS.length} minerals`));
  frag.appendChild(minSection);
  return frag;
}

// ── Last Logged Tab ───────────────────────────────────────────────
function buildLastLoggedTab(){
  const frag=document.createDocumentFragment();
  if(!S.systems.length){
    frag.appendChild(el('div',{class:'pv-empty'},'No systems logged yet.'));
    return frag;
  }
  const sorted=[...S.systems].sort((a,b)=>{
    const ta=a.addedAt?new Date(a.addedAt).getTime():0;
    const tb=b.addedAt?new Date(b.addedAt).getTime():0;
    return tb-ta;
  });
  const wrap=el('div',{class:'pv-wrap'});
  const table=el('table',{class:'min-table'});
  table.appendChild(el('thead',{},el('tr',{},
    el('th',{},'Star System'),
    el('th',{},'Logged'),
    el('th',{},'Planets'),
    el('th',{},'Score')
  )));
  const tbody=el('tbody',{});
  sorted.forEach(sys=>{
    const score=sysVisitScore(sys);
    const band=score!==null?visitBand(score):null;
    const sysSpan=el('span',{class:'pv-sys'},sys.name);
    sysSpan.addEventListener('click',()=>{UI.openSys.add(sys.id);UI.tab='systems';render();window.scrollTo({top:0,behavior:'smooth'});});
    const sysCell=el('td',{}); sysCell.appendChild(sysSpan);
    tbody.appendChild(el('tr',{},
      sysCell,
      el('td',{style:{fontFamily:'monospace',fontSize:'12px',color:'var(--text2)'}},fmtDate(sys.addedAt)),
      el('td',{style:{textAlign:'center'}},String(sys.planets.length)),
      el('td',{},score!==null?el('span',{class:'tag tag-'+(band.cls||'')},String(score)):el('span',{style:{color:'var(--text3)'}},'—'))
    ));
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  frag.appendChild(wrap);
  frag.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'8px',fontFamily:'monospace'}},`${sorted.length} systems · newest first · tap name to jump`));
  return frag;
}

// ── Full render ───────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const frag=document.createDocumentFragment();

  const totalP=S.systems.reduce((n,s)=>n+s.planets.length,0);
  const bioN=S.systems.filter(s=>[...s.planets,...s.planets.flatMap(p=>p.moons||[])].some(b=>b.bioLifeforms)).length;
  const revN=S.systems.filter(s=>[...s.planets,...s.planets.reduce((a,p)=>a.concat(p.moons||[]),[])].some(b=>isRevisitable(b))).length;
  const isLight=document.documentElement.classList.contains('light');

  // Row 1: icon + title + theme toggle
  const themeBtn=el('button',{id:'theme-btn',class:'btn-theme'},isLight?'☀ Light':'☾ Dark');
  themeBtn.addEventListener('click',toggleTheme);

  const iconImg=el('img',{class:'app-icon',src:ICON_SRC,alt:'SC2'});
  const row1=el('div',{class:'header-row1'},
    el('div',{class:'header-row1-left'},
      iconImg,
      el('div',{},
        el('div',{class:'title'},'SC2 Explorer'),
        el('div',{class:'sub'},'The Ur-Quan Masters')
      )
    ),
    themeBtn
  );

  // Row 2: stats
  const statsEl=el('div',{class:'header-row2'});
  [[S.systems.length,'systems'],[totalP,'planets']].forEach(([n,l])=>{
    statsEl.appendChild(el('div',{class:'stat'},el('div',{class:'stat-n'},String(n)),el('div',{class:'stat-l'},l)));
  });
  const bioStat=el('div',{class:'stat stat-btn'+(UI.filterBio?' stat-active':'')},el('div',{class:'stat-n'},String(bioN)),el('div',{class:'stat-l'},'bio'));
  bioStat.addEventListener('click',()=>{UI.filterBio=!UI.filterBio;render();});
  statsEl.appendChild(bioStat);
  const revStat=el('div',{class:'stat stat-btn'+(UI.filterRevisit?' stat-active':'')},el('div',{class:'stat-n'},String(revN)),el('div',{class:'stat-l'},'revisit'));
  revStat.addEventListener('click',()=>{UI.filterRevisit=!UI.filterRevisit;render();});
  statsEl.appendChild(revStat);

  frag.appendChild(el('div',{class:'header',style:{flexDirection:'column',gap:'4px'}},row1,statsEl));

  // Lander Upgrades row
  const upgRow=el('div',{class:'upgrades-row'});
  upgRow.appendChild(el('span',{class:'upgrades-label'},'Lander Upgrades'));
  [
    ['tectonic','⚙ Tectonic Shield'],
    ['weather','⚡ Lightning Shield'],
    ['heat','🔥 Heat Shield'],
  ].forEach(([key,lbl])=>{
    const chkEl=el('input',{type:'checkbox'});
    chkEl.checked=UPGRADES[key];
    chkEl.addEventListener('change',e=>{
      // Compute score delta before/after
      const before=S.systems.map(s=>sysVisitScore(s)||0);
      UPGRADES[key]=e.target.checked;
      saveUpgrades();
      const after=S.systems.map(s=>sysVisitScore(s)||0);
      const improved=after.filter((v,i)=>v>before[i]).length;
      const worsened=after.filter((v,i)=>v<before[i]).length;
      const msg=UPGRADES[key]
        ? `${lbl} ON${improved>0?' · '+improved+' system'+(improved>1?'s':'')+' improved':''}`
        : `${lbl} OFF${worsened>0?' · '+worsened+' system'+(worsened>1?'s':'')+' updated':''}`;
      toast(msg,2500);
      render();
    });
    const wrap=el('label',{class:'upgrade-chk'+(UPGRADES[key]?' active':'')});
    wrap.appendChild(chkEl);
    wrap.appendChild(document.createTextNode(lbl));
    upgRow.appendChild(wrap);
  });
  frag.appendChild(upgRow);

  // Tab bar
  const tabBar=el('div',{class:'tab-bar'});
  const sysTab=el('button',{class:'tab'+(UI.tab==='systems'?' on':'')},'Systems');
  sysTab.addEventListener('click',()=>{UI.tab='systems';render();});
  const notesTab=el('button',{class:'tab'+(UI.tab==='notes'?' on':'')},'Notes');
  notesTab.addEventListener('click',()=>{UI.tab='notes';render();});

  // References dropdown tab
  const refTabs=['planets','tools','minerals','lastlogged'];
  const refLabels={planets:'Planets Visited',tools:'Calculator',minerals:'Minerals',lastlogged:'Last Logged'};
  const isRefTab=refTabs.includes(UI.tab);
  const refLabel=isRefTab?refLabels[UI.tab]:'References';
  const refDropWrap=el('div',{class:'tab-dropdown'});
  const refBtn=el('button',{class:'tab'+(isRefTab?' on':'')},refLabel+' ▾');
  const refMenu=el('div',{class:'tab-dropdown-menu',id:'ref-menu'});
  refTabs.forEach(t=>{
    const item=el('button',{class:'tab-dd-item'+(UI.tab===t?' sel':'')},refLabels[t]);
    item.addEventListener('click',e=>{
      e.stopPropagation();
      UI.tab=t;
      refMenu.classList.remove('open');
      render();
    });
    refMenu.appendChild(item);
  });
  refBtn.addEventListener('click',e=>{
    e.stopPropagation();
    refMenu.classList.toggle('open');
  });
  document.addEventListener('click',()=>refMenu.classList.remove('open'),{once:false});
  refDropWrap.appendChild(refBtn);
  refDropWrap.appendChild(refMenu);

  tabBar.appendChild(sysTab);
  tabBar.appendChild(notesTab);
  tabBar.appendChild(refDropWrap);
  frag.appendChild(tabBar);

  // ── Tab content ──
  if(UI.tab==='notes'){
    frag.appendChild(buildNotesTab());
    app.appendChild(frag);
    setTimeout(()=>{const s=document.getElementById('notes-search');if(s&&!UI.notesSearch)s.focus();},60);
    return;
  }
  if(UI.tab==='planets'){
    frag.appendChild(buildPlanetsTab());
    app.appendChild(frag);
    drawMap();
    return;
  }
  if(UI.tab==='tools'){
    frag.appendChild(buildCalculatorTab());
    app.appendChild(frag);
    return;
  }
  if(UI.tab==='minerals'){
    frag.appendChild(buildMineralsTab());
    app.appendChild(frag);
    return;
  }
  if(UI.tab==='lastlogged'){
    frag.appendChild(buildLastLoggedTab());
    app.appendChild(frag);
    return;
  }

  // Search input with custom autocomplete
  const searchWrap=el('div',{class:'search-row'});
  const si=el('input',{type:'text',id:'search-input',placeholder:'Search star systems...',autocomplete:'off'});
  si.value=UI.search;
  si.addEventListener('input',e=>{
    UI.search=e.target.value;
    renderList();
    updateAC(e.target.value);
  });
  si.addEventListener('blur',()=>setTimeout(()=>{
    const ac=document.getElementById('ac-drop');
    if(ac) ac.remove();
  },150));
  searchWrap.appendChild(si);
  frag.appendChild(searchWrap);

  // Filter row
  const fb=el('div',{class:'filter-bar'});
  fb.appendChild(el('span',{class:'label'},'Filter:'));
  const rPill=el('button',{class:'fpill warn'+(UI.filterRevisit?' on':'')},'Revisit (C5+)');
  rPill.addEventListener('click',()=>{UI.filterRevisit=!UI.filterRevisit;renderList();rPill.className='fpill warn'+(UI.filterRevisit?' on':'');});
  const bPill=el('button',{class:'fpill'+(UI.filterBio?' on':'')},'Bio');
  bPill.addEventListener('click',()=>{UI.filterBio=!UI.filterBio;renderList();bPill.className='fpill'+(UI.filterBio?' on':'');});
  const nPill=el('button',{class:'fpill'+(UI.filterNotes?' on':'')},'Has Notes');
  nPill.addEventListener('click',()=>{UI.filterNotes=!UI.filterNotes;renderList();nPill.className='fpill'+(UI.filterNotes?' on':'');});
  const tPill=el('button',{class:'fpill'+(UI.filterTreasure?' on':'')},'Treasure World');
  tPill.addEventListener('click',()=>{UI.filterTreasure=!UI.filterTreasure;renderList();tPill.className='fpill'+(UI.filterTreasure?' on':'');});
  const hwPill=el('button',{class:'fpill'+(UI.filterHomeworld?' on':'')},'Homeworld');
  hwPill.addEventListener('click',()=>{UI.filterHomeworld=!UI.filterHomeworld;renderList();hwPill.className='fpill'+(UI.filterHomeworld?' on':'');});
  fb.appendChild(rPill);fb.appendChild(bPill);fb.appendChild(nPill);fb.appendChild(tPill);fb.appendChild(hwPill);
  frag.appendChild(fb);

  // Sort row
  const sb=el('div',{class:'filter-bar'});
  sb.appendChild(el('span',{class:'label'},'Sort:'));
  [['name','A–Z'],['dist','Distance'],['cargo','Cargo'],['score','Score'],['logged','Last Logged']].forEach(([val,lbl])=>{
    const p=el('button',{class:'fpill sort-pill'+(UI.sortBy===val?' on':'')},lbl);
    p.addEventListener('click',()=>{UI.sortBy=val;renderList();document.querySelectorAll('.sort-pill').forEach(x=>x.className='fpill sort-pill');p.className='fpill sort-pill on';});
    sb.appendChild(p);
  });
  frag.appendChild(sb);

  // Collapse all / Expand all row
  const ceRow=el('div',{style:{display:'flex',gap:'8px',marginBottom:'8px'}});
  const collapseAllBtn=el('button',{class:'btn-sm',id:'collapse-all'},'Collapse All');
  collapseAllBtn.disabled=UI.openSys.size===0;
  collapseAllBtn.addEventListener('click',()=>{UI.openSys.clear();renderList();});
  const expandAllBtn=el('button',{class:'btn-sm',id:'expand-all'},'Expand All');
  const filtered0=getFiltered();
  expandAllBtn.disabled=filtered0.length===0||UI.openSys.size===filtered0.length;
  expandAllBtn.addEventListener('click',()=>{getFiltered().forEach(s=>UI.openSys.add(s.id));renderList();});
  ceRow.appendChild(collapseAllBtn);
  ceRow.appendChild(expandAllBtn);
  frag.appendChild(ceRow);

  // Add system form
  if(UI.addSys){
    frag.appendChild(sysForm(null,addSys,()=>{UI.addSys=false;render();}));
  }

  // Systems container — renderList() populates this
  const listDiv=el('div',{id:'sys-list'});
  frag.appendChild(listDiv);

  // Map toggle
  const mapToggle=el('div',{class:'map-toggle'},el('span',{},UI.map?'▲':'▼'),el('span',{},`Star map (${S.systems.length} logged)`));
  mapToggle.addEventListener('click',()=>{UI.map=!UI.map;if(!UI.map) mapView=null;render();});
  frag.appendChild(mapToggle);
  if(UI.map){
    const cv=el('canvas',{id:'starmap',height:'280'});
    frag.appendChild(cv);
    const mapMeta=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'4px'}});
    mapMeta.appendChild(el('div',{class:'map-legend'},mapView?`Zoomed ${mapView.x0}–${mapView.x1}, ${mapView.y0}–${mapView.y1} · tap a star to select`:'Tap any of 16 squares to zoom · teal = logged · amber = selected'));
    const resetBtn=el('button',{id:'map-reset',class:'btn-sm',style:{display:mapView?'inline-block':'none'}},'Reset view');
    resetBtn.addEventListener('click',()=>{mapView=null;drawMap();resetBtn.style.display='none';});
    mapMeta.appendChild(resetBtn);
    frag.appendChild(mapMeta);
  }

  // Export / Import / GitHub
  const expBtn=el('button',{class:'btn-sm'},'Export JSON');
  expBtn.addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='sc2-log.json';a.click();
    URL.revokeObjectURL(url);toast('Exported!');
  });

  const csvBtn=el('button',{class:'btn-sm'},'Export CSV');
  csvBtn.addEventListener('click',()=>{
    const rows=[['Star System','Planet','Type','Revisit','Must Visit','Max Resource','Bio','Weather','Tectonics','Temperature','Fuel Dist','Visit Score','Notes']];
    S.systems.forEach(sys=>{
      const fuel=fuelDist(sys.x,sys.y);
      const fd=typeof fuel==='number'?fuel:0;
      const sortedP=[...sys.planets].sort((a,b)=>(a.order||999)-(b.order||999));
      sortedP.forEach(p=>{
        const vs=visitScore(p,fd);
        rows.push([sys.name,p.order||'?',p.type,isRevisitable(p)?'Yes':'No',p.mustVisit?'Yes':'No',p.cargoValue,p.bioLifeforms?'Yes':'No',p.weather,p.tectonics,p.temperature,fuel,vs,p.notes||'']);
        const sortedM=[...(p.moons||[])].sort((a,b)=>(a.order||999)-(b.order||999));
        sortedM.forEach(m=>{
          const mvs=visitScore(m,fd);
          rows.push([sys.name,(p.order||'?')+'.'+(m.order||'?'),m.type,isRevisitable(m)?'Yes':'No',m.mustVisit?'Yes':'No',m.cargoValue,m.bioLifeforms?'Yes':'No',m.weather,m.tectonics,m.temperature,fuel,mvs,m.notes||'']);
        });
      });
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='sc2-planets.csv';a.click();
    URL.revokeObjectURL(url);toast('CSV exported!');
  });
  const impLbl=el('label',{class:'btn-sm',style:{cursor:'pointer',border:'.5px solid var(--bdr2)',borderRadius:'var(--rs)',padding:'7px 13px',display:'inline-block'}},'Import JSON');
  const impInp=el('input',{type:'file',accept:'.json',style:{display:'none'}});
  impInp.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{const p=JSON.parse(ev.target.result);if(p.systems){S=p;persist();render();toast('Imported!');}else toast('Invalid file');}
      catch(e){toast('Could not parse');}
      impInp.value='';
    };
    r.readAsText(f);
  });
  impLbl.appendChild(impInp);
  const ghBtn=el('button',{class:'btn-sm'},'⇅ GitHub');
  ghBtn.addEventListener('click',()=>{UI.ghOpen=true;render();});
  frag.appendChild(el('div',{class:'export-row'},expBtn,csvBtn,impLbl,ghBtn));

  // GitHub upload timestamp banner
  if(GH.lastPush){
    const banner=el('div',{class:'gh-banner'},
      el('span',{class:'gh-banner-icon'},'↑'),
      el('span',{class:'gh-banner-label'},'Last GitHub upload:'),
      el('span',{class:'gh-banner-ts'},GH.lastPush)
    );
    banner.addEventListener('click',()=>{UI.ghOpen=true;render();});
    frag.appendChild(banner);
  }

  // GitHub modal
  if(UI.ghOpen) frag.appendChild(buildGHModal());

  // FAB
  if(!UI.addSys){
    const fab=el('button',{class:'fab','aria-label':'Add star system'},'+');
    fab.addEventListener('click',()=>{UI.addSys=true;UI.openSys.clear();render();window.scrollTo({top:0,behavior:'smooth'});});
    frag.appendChild(fab);
  }

  app.appendChild(frag);
  if(UI.tab==='systems') renderList();
  drawMap();
}

// ── Star Map ──────────────────────────────────────────────────────
// mapView: {x0,y0,x1,y1} in map coords (0–1000). null = full view
let mapView = null;

function drawMap(){
  const cv=document.getElementById('starmap');
  if(!cv) return;
  const resetBtn=document.getElementById('map-reset');

  const dpr=window.devicePixelRatio||1;
  const w=cv.offsetWidth||320;
  cv.width=w*dpr;cv.height=w*dpr;cv.style.height=w+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);

  const view=mapView||{x0:0,y0:0,x1:1000,y1:1000};
  const pad=16;
  const inner=w-pad*2;
  const px=v=>pad+((v-view.x0)/(view.x1-view.x0))*inner;
  // py: game Y=0 at bottom, canvas Y=0 at top — correct for any zoom level
  const py=v=>pad+((view.y1-v)/(view.y1-view.y0))*inner;

  const dark=!document.documentElement.classList.contains('light');
  const gc=dark?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)';
  const lc=dark?'#636366':'#aaa';

  // Grid lines — 4×4 in full view, finer grid when zoomed
  const gridStep=mapView?125:250;
  ctx.strokeStyle=gc;ctx.lineWidth=.5;
  for(let v=0;v<=1000;v+=gridStep){
    if(v>=view.x0&&v<=view.x1){ctx.beginPath();ctx.moveTo(px(v),pad);ctx.lineTo(px(v),w-pad);ctx.stroke();}
    if(v>=view.y0&&v<=view.y1){ctx.beginPath();ctx.moveTo(pad,py(v));ctx.lineTo(w-pad,py(v));ctx.stroke();}
  }

  // In full view, label the 4×4 grid squares so user knows where to tap
  if(!mapView){
    ctx.fillStyle=lc;ctx.font='8px monospace';ctx.globalAlpha=.45;
    for(let col=0;col<4;col++){
      for(let row=0;row<4;row++){
        const lx=px(col*250)+4;
        const ly=py((3-row)*250+250)+11; // top of each square
        ctx.fillText(`${col*250},${row*250}`,lx,ly);
      }
    }
    ctx.globalAlpha=1;
  }

  // Sol
  const sx=px(SOL_X),sy=py(SOL_Y);
  if(sx>=pad&&sx<=w-pad&&sy>=pad&&sy<=w-pad){
    ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);
    ctx.fillStyle='#EF9F27';ctx.globalAlpha=.4;ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle=lc;ctx.font='9px monospace';ctx.fillText('Sol',sx+6,sy+3);
  }

  const dotR=mapView?5:4;
  S.systems.forEach(s=>{
    const cx=px(s.x),cy=py(s.y),sel=UI.openSys.has(s.id);
    if(cx<pad-dotR||cx>w-pad+dotR||cy<pad-dotR||cy>w-pad+dotR) return;
    ctx.beginPath();ctx.arc(cx,cy,sel?dotR+3:dotR,0,Math.PI*2);
    ctx.fillStyle=sel?'#EF9F27':'#5DCAA5';ctx.globalAlpha=.9;ctx.fill();ctx.globalAlpha=1;
    if(sel){ctx.beginPath();ctx.arc(cx,cy,dotR+8,0,Math.PI*2);ctx.strokeStyle='#EF9F27';ctx.lineWidth=1;ctx.globalAlpha=.5;ctx.stroke();ctx.globalAlpha=1;}
    ctx.fillStyle=lc;ctx.font=mapView?'10px monospace':'9px monospace';ctx.fillText(s.name,cx+dotR+3,cy+4);
  });

  // Corner labels
  ctx.fillStyle=lc;ctx.font='9px monospace';
  ctx.fillText(`${view.x0},${view.y0}`,pad,w-4);
  ctx.fillText(`${view.x1}`,w-30,w-4);

  // Click handler — two-stage: first tap zooms quadrant, second tap (when zoomed) selects star
  cv.onclick=function(e){
    const rect=cv.getBoundingClientRect();
    const scaleX=w/rect.width;
    const mx=(e.clientX-rect.left)*scaleX;
    const my=(e.clientY-rect.top)*scaleX;

    // Convert click to map coords — inverse of px/py
    const mapX=view.x0+((mx-pad)/inner)*(view.x1-view.x0);
    const mapY=view.y1-((my-pad)/inner)*(view.y1-view.y0);

    if(!mapView){
      // Full view — first tap zooms into the clicked 250×250 square (4×4 grid)
      const qx=Math.floor(mapX/250)*250;
      const qy=Math.floor(mapY/250)*250;
      mapView={x0:Math.max(0,qx),y0:Math.max(0,qy),x1:Math.min(1000,qx+250),y1:Math.min(1000,qy+250)};
      if(resetBtn) resetBtn.style.display='inline-block';
      drawMap();
      return;
    }

    // Zoomed view — tap selects nearest star
    let hit=null,best=mapView?(view.x1-view.x0)*0.06:20;
    S.systems.forEach(s=>{
      const cx=px(s.x),cy=py(s.y);
      const d=Math.sqrt((mx-cx)*(mx-cx)+(my-cy)*(my-cy));
      if(d<best){best=d;hit=s;}
    });
    if(hit){
      if(UI.openSys.has(hit.id)) UI.openSys.delete(hit.id); else UI.openSys.add(hit.id);
      UI.addPlanet=null;UI.addMoon=null;
      render();
      setTimeout(function(){
        const card=document.querySelector('[data-sys="'+hit.id+'"]');
        if(card) card.scrollIntoView({behavior:'smooth',block:'start'});
      },60);
    }
  };
}

// ── Boot ──────────────────────────────────────────────────────────
load();
loadGH();
loadUpgrades();
initTheme();
render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
